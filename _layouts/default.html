<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="{{ '/assets/main.js' | relative_url }}" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <div class="header-left">
        <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="{{ site.title | default: 'Home' }}">
          Arif Celebi
        </a>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">
          <span class="sun-icon" aria-hidden="true"><i class="fa-solid fa-sun"></i></span>
          <span class="theme-divider"></span>
          <span class="moon-icon" aria-hidden="true"><i class="fa-solid fa-moon"></i></span>
        </button>
      </div>
    </div>
  </header>

  <main class="page-content">
    {% if page.url == '/' or page.url == '/index.html' %}
    <section class="profile-section" aria-labelledby="profile-heading">
      <div class="profile-card">
        <div class="profile-avatar-link" aria-label="{{ site.author | default: 'Arif' }} profile photo">
          <img class="profile-avatar" src="{{ '/assets/profile.jpg' | relative_url }}" alt="{{ site.author | default: 'Arif' }} profile photo">
        </div>
        <div class="profile-copy">
          <h1 id="profile-heading" class="profile-heading">Hey, it's Arif.</h1>
          <p class="profile-role">Software engineering student exploring AI agents, automation, and software systems.</p>
          <p class="profile-bio">I share what I build, what breaks, and what I learn along the way.</p>
          <nav class="social-links" aria-label="Social links">
            <a href="{{ site.github_url | default: 'https://github.com/Chelebii' }}" target="_blank" rel="noreferrer" aria-label="My GitHub profile"><span class="social-icon" aria-hidden="true"><i class="fa-brands fa-github"></i></span></a>
            <a href="{{ site.linkedin_url | default: 'https://uk.linkedin.com/in/chelebiuk' }}" target="_blank" rel="noreferrer" aria-label="My LinkedIn profile"><span class="social-icon" aria-hidden="true"><i class="fa-brands fa-linkedin-in"></i></span></a>
            <a href="mailto:{{ site.email }}" aria-label="Email me"><span class="social-icon" aria-hidden="true"><i class="fa-regular fa-envelope"></i></span></a>
          </nav>
        </div>
      </div>
    </section>
    {% endif %}

    <section class="content-table-wrapper" aria-labelledby="content-list-heading">
      <h2 id="content-list-heading" class="visually-hidden">Posts</h2>
      {{ content }}
    </section>
  </main>

</body>
</html>
