<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/assets/og-banner.png' | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ '/assets/og-banner.png' | absolute_url }}">
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <script src="{{ '/assets/main.js' | relative_url }}" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <div class="header-left">
        <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="{{ site.title | default: 'Home' }}">
          Arif Celebi
        </a>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">
          <span class="sun-icon" aria-hidden="true"><svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"></circle><path d="M12 2.5v2.2"></path><path d="M12 19.3v2.2"></path><path d="M4.9 4.9l1.6 1.6"></path><path d="M17.5 17.5l1.6 1.6"></path><path d="M2.5 12h2.2"></path><path d="M19.3 12h2.2"></path><path d="M4.9 19.1l1.6-1.6"></path><path d="M17.5 6.5l1.6-1.6"></path></svg></span>
          <span class="theme-divider"></span>
          <span class="moon-icon" aria-hidden="true"><svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor"><path d="M20.2 14.1A8.5 8.5 0 0 1 9.9 3.8a.55.55 0 0 0-.68-.68A9.5 9.5 0 1 0 20.9 14.8a.55.55 0 0 0-.68-.68Z"></path></svg></span>
        </button>
      </div>
    </div>
  </header>

  <main class="page-content">
    {% if page.url == '/' or page.url == '/index.html' %}
    <section class="profile-section" aria-labelledby="profile-heading">
      <div class="profile-card">
        <div class="profile-avatar-link" aria-label="{{ site.author | default: 'Arif' }} profile photo">
          <img class="profile-avatar" src="{{ '/assets/profile-avatar.jpg' | relative_url }}" alt="{{ site.author | default: 'Arif' }} profile photo" width="150" height="150" loading="eager" decoding="sync" fetchpriority="high">
        </div>
        <div class="profile-copy">
          <h1 id="profile-heading" class="profile-heading">Hey, it's Arif.</h1>
          <p class="profile-role">Software engineering student at <a class="inline-link" href="https://www.aru.ac.uk/" target="_blank" rel="noreferrer">@aru</a> in cambridge</p>
          <p class="profile-bio">Building, breaking, and learning with AI agents.</p>
          <nav class="social-links" aria-label="Social links">
            <a href="{{ site.github_url | default: 'https://github.com/Chelebii' }}" target="_blank" rel="noreferrer" aria-label="My GitHub profile"><span class="social-icon" aria-hidden="true"><svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.04c-3.34.73-4.04-1.41-4.04-1.41-.55-1.38-1.33-1.75-1.33-1.75-1.08-.74.08-.72.08-.72 1.2.08 1.83 1.21 1.83 1.21 1.06 1.8 2.79 1.28 3.47.98.11-.75.42-1.28.76-1.57-2.67-.3-5.48-1.31-5.48-5.86 0-1.3.47-2.36 1.24-3.2-.13-.3-.54-1.5.12-3.13 0 0 1-.32 3.3 1.22a11.6 11.6 0 0 1 6 0c2.29-1.54 3.29-1.22 3.29-1.22.66 1.63.25 2.83.12 3.13.77.84 1.24 1.9 1.24 3.2 0 4.56-2.81 5.55-5.49 5.85.43.37.82 1.1.82 2.23v3.3c0 .32.22.69.83.57A12 12 0 0 0 12 .5Z"></path></svg></span></a>
            <a href="{{ site.linkedin_url | default: 'https://uk.linkedin.com/in/chelebiuk' }}" target="_blank" rel="noreferrer" aria-label="My LinkedIn profile"><span class="social-icon" aria-hidden="true"><svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor"><path d="M6.94 8.5H3.56V20h3.38V8.5ZM5.25 3A2.02 2.02 0 0 0 3.2 5.02c0 1.1.83 2.01 2.02 2.01h.03a2.02 2.02 0 1 0 0-4.03ZM20.8 13.02c0-3.47-1.85-5.08-4.32-5.08-1.99 0-2.88 1.1-3.38 1.87V8.5H9.72c.04.87 0 11.5 0 11.5h3.38v-6.42c0-.34.02-.68.13-.92.27-.68.89-1.38 1.93-1.38 1.36 0 1.91 1.04 1.91 2.57V20H20.8v-6.98Z"></path></svg></span></a>
            <a href="mailto:{{ site.email }}" aria-label="Email me"><span class="social-icon" aria-hidden="true"><svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m4 7 8 6 8-6"></path></svg></span></a>
          </nav>
        </div>
      </div>
    </section>
    {% endif %}

    <section class="content-table-wrapper" aria-labelledby="content-list-heading">
      <h2 id="content-list-heading" class="visually-hidden">Posts</h2>
      {{ content }}
    </section>
  </main>

</body>
</html>
